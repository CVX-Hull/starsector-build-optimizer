[project]
name = "starsector-optimizer"
version = "0.1.0"
description = "Automated ship build optimizer for Starsector"
requires-python = ">=3.10"
dependencies = [
    "lifelines>=0.30.0",
    "numpy",
    "pandas",
    "scipy>=1.15.3",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/starsector_optimizer"]
