# Wave 2 — Wolf × early × seed 0 × 200 trials. Frigate cross-cut.
# Per docs/reports/2026-05-10-validation-plan.md §3 Wave 2:
#   3. Wolf × early × seed 0 × 200 trials — frigate cross-cut, smaller
#      opp pool, confirms post-V2 frigate gradient is non-degenerate
#      (mechanism 4: τ̂² should not collapse).
#
# Wave 2 gate (frigate-specific):
#   - Wolf finalized count ≥ 150 (drop-out rate < 25 %)
#   - twfe_fitness variance > 1e-3 (V1 frigate-gradient collapse is gone)
#
# If F4a/F4b trips (player-wins >80% or covariate mismatch), document
# scope decision per validation plan §7 — do NOT abort Wave 3 launch.

name: wave2-wolf-early
budget_usd: 4.0
provider: aws

regions:
  - us-east-1
  - us-east-2

instance_types:
  - c7a.2xlarge
  - c7i.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 8
min_workers_to_start: 4
partial_fleet_policy: proceed_half_speed
matchup_slots_per_worker: 2

ami_ids_by_region:
  us-east-1: ami-0a434660884e985e3
  us-east-2: ami-058e7a119eb656d45

ssh_key_name: starsector-probe

tailscale_authkey_secret: ${TAILSCALE_AUTHKEY}

# Wolf is a frigate (smaller hull, faster TTK) — 200 trials should fit
# within the $4 budget cap.
studies:
  - {hull: wolf, regime: early, seeds: [0], budget_per_study: 200, workers_per_study: 8, sampler: tpe}

max_lifetime_hours: 1.5
fleet_provision_timeout_seconds: 600.0
result_timeout_seconds: 900.0
ledger_heartbeat_interval_seconds: 60.0
