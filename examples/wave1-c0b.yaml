# Wave 1 cell C0b — scalar-CV "A" baseline (legacy trimmed-α̂, no EB, no
# Box-Cox). The validation plan's "Δρ(EB − A) ≥ +0.02 LOOO" gate compares
# C2 against this baseline (which has scalar control variate active).
#
# Activated by setting these env vars at launch time (see launch_wave1.sh):
#   STARSECTOR_EB_MIN_BUILDS=251      → never reach EB activation threshold
#   STARSECTOR_SHAPE_MIN_SAMPLES=251  → never reach Box-Cox activation threshold
#   (TWFE_TRIM_WORST stays at default 2 → scalar CV active)
#
# Per docs/reports/2026-05-10-validation-plan.md §3.1.

name: wave1-c0b
budget_usd: 5.0
provider: aws

regions:
  - us-east-1
  - us-east-2

instance_types:
  - c7a.2xlarge
  - c7i.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 24
min_workers_to_start: 16
partial_fleet_policy: proceed_half_speed
matchup_slots_per_worker: 2

# Post-V2 AMI baked 2026-05-09 in us-east-1; us-east-2 is a tag-propagated
# copy made 2026-05-10 for cross-region capacity diversification (Phase 7.5
# ladder rung 0). These AMIs predate WorkerSourceSha / ManifestSha256 tags;
# re-bake and update both regions before launching under current preflight.
ami_ids_by_region:
  us-east-1: ami-0a434660884e985e3
  us-east-2: ami-058e7a119eb656d45

ssh_key_name: starsector-probe

tailscale_authkey_secret: ${TAILSCALE_AUTHKEY}

studies:
  - {hull: hammerhead, regime: early, seeds: [0], budget_per_study: 250, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [1], budget_per_study: 250, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [2], budget_per_study: 250, workers_per_study: 8, sampler: tpe}

max_lifetime_hours: 2.0
fleet_provision_timeout_seconds: 600.0
result_timeout_seconds: 900.0
ledger_heartbeat_interval_seconds: 60.0
