# Tier-3 concurrency shakedown — 4 studies × 8 workers × 2 slots = 64
# concurrent matchup slots. Runs on hammerhead__early (a validated non-flat
# landscape) so the gate isn't flaky on signal-quality issues. Wall-clock
# ~15 min; spend ~$1.
#
# Purpose: close the concurrency gap between Tier-2 smoke (1 worker, 1 slot)
# and Phase 7 prep (8 studies × 12 workers × 2 slots = 192 concurrent slots).
# Exercises:
#   - _tick_ledger path end-to-end with multiple (region, instance_type) keys
#   - janitor enqueued_at reset + max_requeues drop-path
#   - multi-study Redis key scoping (no cross-study bleed)
#   - concurrent AWS Fleet provisioning without SG-replication-lag retries
#
# Gate (all must hold):
#   - launch_campaign.sh exits 0
#   - final_audit.sh exits 0
#   - ledger.jsonl shows >= 1 worker_heartbeat row
#   - each of the 4 study DBs has >= 1 TrialState.COMPLETE
#
# Tighter max_requeues (3 vs prod 5) + shorter visibility_timeout_seconds (60)
# + shorter janitor_interval_seconds (30) are deliberate: the shakedown is
# supposed to fire the requeue / drop paths, not wait for pathological cases.
#
# Launch:
#   set -a; source .env; set +a            # loads TAILSCALE_AUTHKEY
#   scripts/cloud/devenv-up.sh             # optional: rootless tailscale+redis
#   scripts/cloud/launch_campaign.sh examples/phase7-prep-shakedown.yaml

name: phase7-shakedown
budget_usd: 2.0
provider: aws

regions:
  - us-east-1
  - us-east-2

instance_types:
  - c7a.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 32
min_workers_to_start: 16
partial_fleet_policy: proceed_half_speed

# AMIs from 2026-04-19 bake (post-mod_commit_sha wiring fix; manifest
# carries git SHA c813561 end-to-end; AMI tags mirror manifest via Packer).
ami_ids_by_region:
  us-east-1: ami-0a9cb6be884488352
  us-east-2: ami-0e60f66b6e3799758

ssh_key_name: starsector-probe

tailscale_authkey_secret: ${TAILSCALE_AUTHKEY}

# 4 studies — same hull+regime, 4 distinct seeds. Parallelism comes from
# (study, worker, slot) multiplicity, not archetype diversity. Hammerhead
# is chosen because 5D's LOOO Δρ=+0.036 validates it as a non-flat
# landscape; the gate isn't flaky on signal-quality issues.
studies:
  - {hull: hammerhead, regime: early, seeds: [0], budget_per_study: 60, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [1], budget_per_study: 60, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [2], budget_per_study: 60, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [3], budget_per_study: 60, workers_per_study: 8, sampler: tpe}

max_lifetime_hours: 1.0
fleet_provision_timeout_seconds: 600.0
result_timeout_seconds: 600.0
ledger_heartbeat_interval_seconds: 30.0

# Shakedown-specific overrides — shorter visibility_timeout_seconds + janitor
# interval + tighter max_requeues so the new requeue-reset + hard-cap paths
# from the Phase-7-prep refactor actually fire during the ~15 min gate run.
# Production default is max_requeues=5 in CampaignConfig; 3 here is intentional.
visibility_timeout_seconds: 60.0
janitor_interval_seconds: 30.0
max_requeues: 3
