# Multi-hull / multi-trial / multi-opponent smoke — exercises the loadout
# diagnostic across varied builds to confirm the post-fix MissionDefinition
# pre-deploy variant build path is robust beyond a single matchup.
#
# Three studies (FRIGATE / DESTROYER / CRUISER) × 2 trials × 2 active
# opponents = 12 LOADOUT_OK lines per run. Six distinct TPE-proposed builds
# (each trial gets a fresh proposal; the same build fights 2 opponents).
# Studies run as parallel subprocesses so total wall ≈ 1 study's wall time.
#
# Used to verify (a) every diagnostic field matches across the build space,
# (b) seed=0 reruns produce identical LOADOUT_OK counts (TPE determinism),
# (c) no MISMATCH warning fires for any (hull, build) combo.

name: smoke-multi
budget_usd: 2.0
provider: aws

regions:
  - us-east-1

instance_types:
  - c7a.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 3
min_workers_to_start: 3
partial_fleet_policy: abort

# Worker AMI baked 2026-05-10 from commit 0c11489 and tagged with
# WorkerSourceSha / ManifestSha256. Re-bake after changing worker Python,
# Java mod payload, or staged game manifest data.
ami_ids_by_region:
  us-east-1: ami-07470878a86badf73

ssh_key_name: starsector-probe

tailscale_authkey_secret: ${TAILSCALE_AUTHKEY}

studies:
  - hull: wolf            # FRIGATE
    regime: early
    seeds: [0]
    budget_per_study: 2
    workers_per_study: 1
    sampler: tpe
    active_opponents: 2

  - hull: hammerhead      # DESTROYER
    regime: early
    seeds: [0]
    budget_per_study: 2
    workers_per_study: 1
    sampler: tpe
    active_opponents: 2

  - hull: eagle           # CRUISER
    regime: early
    seeds: [0]
    budget_per_study: 2
    workers_per_study: 1
    sampler: tpe
    active_opponents: 2

max_lifetime_hours: 0.5
fleet_provision_timeout_seconds: 600.0
result_timeout_seconds: 600.0
visibility_timeout_seconds: 300.0
ledger_heartbeat_interval_seconds: 60.0
