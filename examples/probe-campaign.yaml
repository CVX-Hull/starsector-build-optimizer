# Tier-1 validation probe — 2 × c7a.2xlarge spot for ~3-5 min wall-clock.
# Exercises AWSProvider.provision_fleet + LaunchTemplate/SecurityGroup machinery
# + terminate_fleet. Does NOT exercise Tailscale, Redis, or the worker
# agent (Tier-2 smoke covers those).
#
# Regenerate ami_ids_by_region after re-baking:
#   scripts/cloud/bake_image.sh
#
# Run:
#   scripts/cloud/probe.sh examples/probe-campaign.yaml
#
# Expected cost: ~$0.05. Budget_usd cap of 1.0 gives >10× safety margin.

name: probe
budget_usd: 1.0
provider: aws

regions:
  - us-east-1
  - us-east-2

instance_types:
  - c7a.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 2     # 1 per region
min_workers_to_start: 1
partial_fleet_policy: abort

# Worker AMIs baked 2026-05-10 from worker-source digest fd2e7e09 and tagged with
# WorkerSourceSha / ManifestSha256. Re-bake and update both regions after
# changing worker Python, Java mod payload, or staged game manifest data.
ami_ids_by_region:
  us-east-1: ami-09176d9cc7a56cfe4
  us-east-2: ami-0f629bef06d00829e

ssh_key_name: starsector-probe

# Unused in Tier-1 probe (probe userdata skips Tailscale entirely);
# a non-empty string is required by CampaignConfig validation.
tailscale_authkey_secret: probe-does-not-use-tailscale

# Probe has no Optuna studies — it's pure infrastructure validation.
studies: []

max_lifetime_hours: 1.0
fleet_provision_timeout_seconds: 600.0
