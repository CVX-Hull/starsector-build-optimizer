# Tier-2.5 pipeline smoke — same code path as Tier-2.0 but 3 workers × 20
# trials to exercise the concurrent-dispatch paths (multiple study subprocess
# fleets racing for Optuna trial slots + multiple Flask POST /result races).
#
# Tier-2.0 (smoke-campaign.yaml) validated: one worker full round-trip. This
# validates: per-study multi-worker dispatch, concurrent Redis BRPOPLPUSH,
# and the CloudWorkerPool dispatch_semaphore pool-concurrency cap.
#
# Gate (all must hold):
#   - launch_campaign.sh exits 0
#   - final_audit.sh smoke-multiworker exits 0
#   - ledger.jsonl shows >= 3 worker_heartbeat events (one per worker)
#   - Optuna study SQLite has >= 10 TrialState.COMPLETE
#     (20 requested; pruner / ASHA rungs may stop some early — 10 is a
#     reasonable multi-worker concurrency floor)
#
# Expected cost: ~$1 (3× c7a.2xlarge for ~15 min at 81 trials/hr aggregate).
# Budget cap at 3.0 USD = 3x safety margin.

name: smoke-multiworker
budget_usd: 3.0
provider: aws

regions:
  - us-east-1

instance_types:
  - c7a.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 3
min_workers_to_start: 2          # need at least 2 for concurrency validation
partial_fleet_policy: abort

# Default for c7a.2xlarge (8 vCPU) is 2 JVMs per VM @ ~2.5 cores each. Total
# pool concurrency = workers_per_study × matchup_slots_per_worker = 3 × 2 = 6.
matchup_slots_per_worker: 2

# AMI from 2026-04-18 bake; re-bake produces new IDs.
# AMIs rebuilt 2026-04-18 for threaded worker_agent + project_tag-scoped Redis keys.
ami_ids_by_region:
  us-east-1: ami-013af3c3b247d43ef

ssh_key_name: starsector-probe

# Field-scoped env-substitution; load_campaign_config resolves ${TAILSCALE_AUTHKEY}.
tailscale_authkey_secret: ${TAILSCALE_AUTHKEY}

studies:
  - hull: hammerhead
    regime: early
    seeds: [0]
    budget_per_study: 20          # exercises multi-trial dispatch racing
    workers_per_study: 3          # ← the tier-2.5 distinguishing parameter
    sampler: tpe

max_lifetime_hours: 0.5           # short leash; 20 trials @ 81/hr ≈ 15 min
fleet_provision_timeout_seconds: 600.0
result_timeout_seconds: 600.0     # deviates from spec default 900.0; smoke-only
ledger_heartbeat_interval_seconds: 60.0
