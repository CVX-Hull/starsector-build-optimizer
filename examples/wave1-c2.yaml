# Wave 1 cell C2 — production default (EB shrinkage + Box-Cox A3 + triple-goal
# rank correction; no heuristic warm-start). The validation plan's "isolates
# mechanism 8 (Box-Cox marginal)" cell.
#
# Per docs/reports/2026-05-10-validation-plan.md §3.1, hammerhead × early ×
# 3 seeds × 250 trials × 8 workers per study. Runs are sequential across
# 5 cells (C0a/C0b/C1/C2/C3); within each cell the 3 seeds run in parallel.
#
# Launch:
#   set -a; source .env; set +a
#   scripts/cloud/devenv-up.sh             # if not already up
#   scripts/cloud/launch_wave1.sh          # sequences all 5 cells with the
#                                          # appropriate STARSECTOR_* env vars
#
# This YAML alone (no env vars) → the C2 cell. The launch_wave1.sh wrapper
# is the canonical entry — running this YAML directly skips the C0a/C0b/C1/C3
# ablation comparisons.
#
# Expected per-cell cost: ~$2.50 at 122 matchups/hr/VM (V1 baseline pending
# re-validation; this campaign IS the re-validation).

name: wave1-c2
budget_usd: 5.0
provider: aws

regions:
  - us-east-1
  - us-east-2

instance_types:
  - c7a.2xlarge
  - c7i.2xlarge

spot_allocation_strategy: price-capacity-optimized
capacity_rebalancing: true

max_concurrent_workers: 24       # 3 studies × 8 workers
min_workers_to_start: 16          # >=2 workers per study (floor)
partial_fleet_policy: proceed_half_speed
matchup_slots_per_worker: 2

# Post-V2 AMI baked 2026-05-09 in us-east-1 (commit dc71e3b); us-east-2 is a
# tag-propagated copy made 2026-05-10 for cross-region capacity diversification
# (Phase 7.5 ladder rung 0). These AMIs predate WorkerSourceSha /
# ManifestSha256 tags; re-bake and update both regions before launching under
# current preflight.
ami_ids_by_region:
  us-east-1: ami-0a434660884e985e3
  us-east-2: ami-058e7a119eb656d45

ssh_key_name: starsector-probe

tailscale_authkey_secret: ${TAILSCALE_AUTHKEY}

# 3 seeds × hammerhead × early × 250 trials × 8 workers. Each study is its
# own subprocess + study DB; the three seeds run concurrently, sharing the
# 24-VM fleet. budget_per_study=250 hits the 5D N≥250 floor for stable γ̂
# at the post-Phase-7-prep p=10 covariate set.
studies:
  - {hull: hammerhead, regime: early, seeds: [0], budget_per_study: 250, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [1], budget_per_study: 250, workers_per_study: 8, sampler: tpe}
  - {hull: hammerhead, regime: early, seeds: [2], budget_per_study: 250, workers_per_study: 8, sampler: tpe}

max_lifetime_hours: 2.0
fleet_provision_timeout_seconds: 600.0
result_timeout_seconds: 900.0
ledger_heartbeat_interval_seconds: 60.0
